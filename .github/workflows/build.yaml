# SPDX-License-Identifier: Apache-2.0
name: Build and Release Toolchain

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  PKG_VENDOR: axelera
  PKG_INSTALL_PREFIX: opt/axelera

jobs:
  build:
    strategy:
      matrix:
        os: [external-runner-8-32-x86, external-runner-8-32-arm64]
        toolchain: [gcc, llvm]
        include:
          - os: external-runner-8-32-x86
            arch: amd64
            container_image: quay.io/pypa/manylinux_2_28_x86_64
          - os: external-runner-8-32-arm64
            arch: arm64
            container_image: quay.io/pypa/manylinux_2_28_aarch64

    runs-on:
      group: ci-external-repo
      labels: ${{ matrix.os }}

    container:
      image: ${{ matrix.container_image }}

    name: Build and package (manylinux_2_28, ${{ matrix.arch }}, ${{ matrix.toolchain }})

    steps:
    - name: Install dependencies
      run: |
        dnf install -y \
          libtool flex wget openssh-clients \
          gmp-devel mpfr-devel libmpc-devel \
          texinfo gperf patchutils bc \
          expat-devel ncurses-devel \
          ninja-build rsync diffutils \
          dpkg fakeroot

        # Install GitHub CLI
        dnf install -y dnf-plugins-core
        dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
        dnf install -y gh

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Execute keyscan for repo servers
      run: |
        [[ -e /etc/ssh/ssh_known_hosts ]] && ssh-keygen -R github.com || true
        mkdir -p ~/.ssh
        ssh-keyscan -H github.com >> /etc/ssh/ssh_known_hosts
      shell: bash

    - uses: webfactory/ssh-agent@v0.9.1
      with:
        ssh-private-key: ${{ secrets.TOOLS_LLVM_DEPLOY_KEY }}

    - name: Set package name
      run: |
        echo "PKG_NAME=riscv64-unknown-elf-toolchain-${{ matrix.toolchain }}" >> "$GITHUB_ENV"

    - name: Build Toolchain
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        ./build_${{ matrix.toolchain }}.sh

    - name: Sanity check toolchain
      run: |
        FAIL=0

        if [ "${{ matrix.toolchain }}" = "llvm" ]; then
          # Verify clang can compile a minimal program
          echo 'int main() { return 0; }' > /tmp/test.c
          install/bin/clang --target=riscv64-unknown-elf -c /tmp/test.c -o /dev/null \
            || { echo "FAIL: clang cannot compile"; FAIL=1; }

          # Verify all expected multilib variants have newlib headers and compiler-rt
          EXPECTED_DIRS="riscv64-unknown-elf/rv64ima/lp64 riscv64-unknown-elf/rv64imac/lp64 riscv64-unknown-elf/rv64imafdc/lp64f riscv64-unknown-elf/rv64imafdc/lp64d"
          for dir in $EXPECTED_DIRS; do
            if [ ! -f "install/lib/clang-runtimes/${dir}/include/assert.h" ]; then
              echo "FAIL: missing newlib headers in ${dir}"
              FAIL=1
            fi
            if [ ! -f "install/lib/clang-runtimes/${dir}/lib/libclang_rt.builtins.a" ]; then
              echo "FAIL: missing compiler-rt builtins in ${dir}"
              FAIL=1
            fi
          done

          # Verify multilib.yaml is present
          if [ ! -f "install/lib/clang-runtimes/multilib.yaml" ]; then
            echo "FAIL: missing multilib.yaml"
            FAIL=1
          fi
        fi

        if [ "${{ matrix.toolchain }}" = "gcc" ]; then
          # Verify key binaries exist
          for bin in gcc g++ gdb ld as objdump; do
            if [ ! -x "install/bin/riscv64-unknown-elf-${bin}" ]; then
              echo "FAIL: missing binary riscv64-unknown-elf-${bin}"
              FAIL=1
            fi
          done

          # Verify multilib support (should have multiple lib dirs)
          MULTILIB_COUNT=$(find install/lib/gcc/riscv64-unknown-elf -name "libgcc.a" | wc -l)
          if [ "$MULTILIB_COUNT" -lt 2 ]; then
            echo "FAIL: expected multiple multilib variants, found ${MULTILIB_COUNT}"
            FAIL=1
          fi
        fi

        if [ "$FAIL" -ne 0 ]; then
          echo "Sanity check FAILED"
          exit 1
        fi
        echo "All sanity checks passed"

    - name: Determine semantic version
      run: |
        cat install/VERSION-${{ matrix.toolchain }}
        . install/VERSION-${{ matrix.toolchain }}
        echo "PKG_FULL_NAME=${{ env.PKG_VENDOR }}-${PKG_NAME}_${GIT_SEMVER_FROM_TAG}" >> "$GITHUB_ENV"
        echo "GIT_SEMVER_FROM_TAG=$GIT_SEMVER_FROM_TAG" >> "$GITHUB_ENV"
        echo "PKG_RELEASE_NUMBER=$PKG_RELEASE_NUMBER" >> "$GITHUB_ENV"
        echo "PKG_DEPENDS=$PKG_DEPENDS" >> "$GITHUB_ENV"

    # --- Build minimal LLVM toolchain (only for llvm jobs) ---
    - name: Build minimal LLVM toolchain
      if: matrix.toolchain == 'llvm'
      run: |
        ./build_llvm_minimal.sh

    - name: Determine minimal semantic version
      if: matrix.toolchain == 'llvm'
      run: |
        cat install-llvm-minimal/VERSION-llvm-minimal
        . install-llvm-minimal/VERSION-llvm-minimal
        MINIMAL_PKG_NAME="riscv64-unknown-elf-toolchain-llvm-minimal"
        echo "MINIMAL_PKG_FULL_NAME=${{ env.PKG_VENDOR }}-${MINIMAL_PKG_NAME}_${GIT_SEMVER_FROM_TAG}" >> "$GITHUB_ENV"

    - name: Archive minimal toolchain
      if: matrix.toolchain == 'llvm'
      run: |
        MINIMAL_ARCHIVE="${{ env.MINIMAL_PKG_FULL_NAME }}_linux_${{ matrix.arch }}.tar.gz"
        mv install-llvm-minimal ${{ env.MINIMAL_PKG_FULL_NAME }}
        tar -czf "$MINIMAL_ARCHIVE" ${{ env.MINIMAL_PKG_FULL_NAME }}
        echo "MINIMAL_ARCHIVE=$MINIMAL_ARCHIVE" >> "$GITHUB_ENV"

    - name: Create minimal .deb package
      if: matrix.toolchain == 'llvm'
      run: |
        mkdir -p debian-minimal/${{ env.PKG_INSTALL_PREFIX }}
        cp -a ${{ env.MINIMAL_PKG_FULL_NAME }} debian-minimal/${{ env.PKG_INSTALL_PREFIX }}/
        mkdir -p debian-minimal/DEBIAN
        find debian-minimal -type d | xargs chmod 755

        MINIMAL_PKG_NAME="riscv64-unknown-elf-toolchain-llvm-minimal"
        sed -e "s|@PKG_VERSION@|${GIT_SEMVER_FROM_TAG}|" \
            -e "s|@PKG_NAME@|${{ env.PKG_VENDOR }}-${MINIMAL_PKG_NAME}|" \
            -e "s|@PKG_RELEASE_NUMBER@|${PKG_RELEASE_NUMBER}|" \
            -e "s|@DEB_PKG_ARCH@|${{ matrix.arch }}|" \
            debian-pkg-control.llvm-minimal > debian-minimal/DEBIAN/control

        fakeroot dpkg-deb --build debian-minimal
        MINIMAL_DEB="${{ env.MINIMAL_PKG_FULL_NAME }}_linux_${{ matrix.arch }}.deb"
        mv debian-minimal.deb "$MINIMAL_DEB"
        echo "MINIMAL_DEB=$MINIMAL_DEB" >> "$GITHUB_ENV"

    - name: Upload minimal (.tar.gz) build artifact
      if: matrix.toolchain == 'llvm'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.MINIMAL_ARCHIVE }}
        path: ${{ env.MINIMAL_ARCHIVE }}

    - name: Upload minimal (.deb) build artifact
      if: matrix.toolchain == 'llvm'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.MINIMAL_DEB }}
        path: ${{ env.MINIMAL_DEB }}

    - name: Upload minimal (.tar.gz) to release
      if: matrix.toolchain == 'llvm' && github.event_name == 'release'
      run: |
        gh release upload ${{ github.event.release.tag_name }} \
        ${{ env.MINIMAL_ARCHIVE }} --clobber
      env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload minimal (.deb) to release
      if: matrix.toolchain == 'llvm' && github.event_name == 'release'
      run: |
        gh release upload ${{ github.event.release.tag_name }} \
        ${{ env.MINIMAL_DEB }} --clobber
      env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # --- Package the main toolchain ---
    - name: Re-name and archive the build directory
      run: |
        ARCHIVE_NAME="${{ env.PKG_FULL_NAME }}_linux_${{ matrix.arch }}.tar.gz"
        mv install ${{ env.PKG_FULL_NAME }}
        tar -czf "$ARCHIVE_NAME" ${{ env.PKG_FULL_NAME }}
        echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> "$GITHUB_ENV"

    # Create .deb package
    - name: Create DEBIAN directory
      run: |
        mkdir -p debian/${{ env.PKG_INSTALL_PREFIX }}
        cp -a ${{ env.PKG_FULL_NAME }} debian/${{ env.PKG_INSTALL_PREFIX }}/
        mkdir -p debian/DEBIAN
        find debian -type d | xargs chmod 755

    - name: Create control file with version
      run: |
          DEB_PKG_ARCH="${{ matrix.arch }}"
          sed -e "s|@PKG_VERSION@|${GIT_SEMVER_FROM_TAG}|" \
              -e "s|@PKG_NAME@|${{ env.PKG_VENDOR }}-${PKG_NAME}|" \
              -e "s|@PKG_RELEASE_NUMBER@|${PKG_RELEASE_NUMBER}|" \
              -e "s|@DEB_PKG_ARCH@|${DEB_PKG_ARCH}|" \
              -e "s|@PKG_DEPENDS@|${PKG_DEPENDS}|" \
              debian-pkg-control.${{ matrix.toolchain }} > debian/DEBIAN/control

    - name: Build .deb package
      run: |
        fakeroot dpkg-deb --build debian
        DEB_NAME="${{ env.PKG_FULL_NAME }}_linux_${{ matrix.arch }}.deb"
        mv debian.deb "$DEB_NAME"
        echo "DEB_NAME=$DEB_NAME" >> "$GITHUB_ENV"

    # Upload artifacts
    - name: Upload (.deb) build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.DEB_NAME }}
        path: ${{ env.DEB_NAME }}

    - name: Upload (.tar.gz) build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARCHIVE_NAME }}
        path: ${{ env.ARCHIVE_NAME }}

    - name: Upload (.tar.gz) to release
      if: github.event_name == 'release'
      run: |
        gh release upload ${{ github.event.release.tag_name }} \
        ${{ env.ARCHIVE_NAME }} --clobber
      env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload (.deb) to release
      if: github.event_name == 'release'
      run: |
        gh release upload ${{ github.event.release.tag_name }} \
        ${{ env.DEB_NAME }} --clobber
      env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-release-description:
    name: Update release description with version info
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update release description
        run: |
          gh release edit ${{ github.event.release.tag_name }} \
            --notes-file versions.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
